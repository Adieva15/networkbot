<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Нейросетевой помощник</title>
    <style>
        body { font-family: Arial; margin:40; }
        .function-box { border: 1px solid #ccc; padding: 15px; margin-bottom:20px; border-radius: 8px; }
        .result { background: #f0f0f0; padding: 10px; border-radius: 5px; margin-top: 10px;}
        .error {color: red;}
    </style>
</head>
<body>
    <h1>Нейросетевой помощник</h1>
    <p>Выберите функцию и введите данные</p>

    {% if error %}
    <div class="error" style="color:red; background: #ffe6e6; padding: 10px; border-radius: 5px;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data" id="mainForm">
        <div class="function-box">
            <h3>Текстовые функции</h3>
            <select name="action" id="actionSelect">
                <option value="sentiment">Анализ тональности</option>
                <option value="generate">Генерация текста</option>
                <option value="summarize">Пересказ текста</option>
                <option value="chat">Чат с ИИ-агентом</option>
            </select>
            <br><br>
            <textarea name="text" id="textInput" rows="4" cols="50" placeholder="Введите текст..."></textarea>
            <br>
            <input type="submit" value="Отправить">
        </div>
    </form>

    <script>
        // Получаем историю из сессии (передана из Flask)
        const initialHistory = {{ chat_history|tojson|safe }};

        function addMessage(role, text) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.style.margin = '5px 0';
            if (role === 'user') {
                div.style.textAlign = 'right';
                div.style.color = 'blue';
            } else {
                div.style.textAlign = 'left';
                div.style.color = 'green';
            }
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Загружаем историю при загрузке страницы (если есть)
        window.addEventListener('DOMContentLoaded', function() {
            if (initialHistory) {
                initialHistory.forEach(msg => {
                    if (msg.role !== 'system') {
                        addMessage(msg.role, msg.content);
                    }
                });
            }
            // Показываем чат, если выбрана опция
            const select = document.getElementById('actionSelect');
            toggleChat(select.value);
        });

        // Переключение видимости чата и текстового поля
        function toggleChat(action) {
            const textArea = document.getElementById('text-input-area');
            const chatContainer = document.getElementById('chat-container');
            const submitBtn = document.getElementById('submitBtn');
            if (action === 'chat') {
                textArea.style.display = 'none';
                chatContainer.style.display = 'block';
                submitBtn.style.display = 'none'; // скрываем кнопку отправки формы
            } else {
                textArea.style.display = 'block';
                chatContainer.style.display = 'none';
                submitBtn.style.display = 'inline-block';
            }
        }

        document.getElementById('actionSelect').addEventListener('change', function() {
            toggleChat(this.value);
        });

        // Отправка сообщения в чате
        document.getElementById('chat-send').addEventListener('click', function() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            addMessage('user', msg);
            input.value = '';
            // Отправляем на сервер
            fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            })
            .then(response => response.json())
            .then(data => {
                if (data.reply) {
                    addMessage('assistant', data.reply);
                } else if (data.error) {
                    addMessage('assistant', 'Ошибка: ' + data.error);
                }
            })
            .catch(error => {
                addMessage('assistant', 'Ошибка сети: ' + error);
            });
        });

        // Отправка по Enter
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('chat-send').click();
                e.preventDefault();
            }
        });
    </script>

    {% if result_text %}
        <div class="result">
            <h3>Результат</h3>
            <p>{{ result_text }}</p>
        </div>
    {% endif %}

</body>
</html>
